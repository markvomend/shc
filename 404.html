<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | The Shepherd Home Care</title>
  <link rel="icon" type="image/png" href="images/the-shepherd-home-care.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <style>
    .not-found {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
    }

    .not-found h1 {
      font-size: 6rem;
      margin-bottom: 0;
    }
  </style>
</head>

<body>
  <header class="site-header" id="site-header" role="banner">
    <div class="container">
      <a class="logo" href="/">
        <img src="images/the-shepherd-home-care-yello.png" alt="The Shepherd Home Care Logo">
      </a>
    </div>
  </header>

  <main id="main">
    <section class="not-found">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>Sorry, the page you're looking for doesn't exist or has moved.</p>
      <a class="btn btn--primary" href="/" style="margin-top: 24px;">Back to Home</a>
    </section>
  </main>
</body>

</html>
